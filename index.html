<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Diamond Store</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.header { background:#020617; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
.switch { text-align:center; margin:10px; }
.switch button { margin:5px; padding:8px 15px; border:none; border-radius:8px; cursor:pointer; }

.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; padding:15px; }
.card { background:#1e293b; padding:20px; border-radius:12px; text-align:center; cursor:pointer; }

.form { display:none; padding:15px; }
input { width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:10px; }

.nominal-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.nominal-item { background:#1e293b; padding:10px; border-radius:8px; cursor:pointer; text-align:center; }
.selected { background:#22c55e; }

button.main { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#22c55e; }

.qris-box { display:none; background:#1e293b; padding:10px; border-radius:10px; margin-top:10px; text-align:center; }
</style>
</head>

<body>

<div class="header">🔥 AR DIAMOND STORE</div>

<div class="grid">
<div class="card">🔥 Free Fire</div>
<div class="card">⚔️ Mobile Legends</div>
</div>

</body>
</html>
